version: 2
updates:
  # Enable version updates for pnpm (uses "npm" ecosystem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Enable version updates for php
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep GitHub Actions SHA pins current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
