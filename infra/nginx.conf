# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3265168/before/*;
include forge-conf/3265168/imprint.jerome-arfouche.ca/before/*;

server {
    http2 on;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name imprint.jerome-arfouche.ca;
    server_tokens off;
    root /home/forge/imprint.jerome-arfouche.ca/current/public;

    # FORGE SSL (DO NOT REMOVE!)
    ssl_certificate /etc/nginx/ssl/domains/1765309/3563259/server.crt;
    ssl_certificate_key /etc/nginx/ssl/domains/1765309/3563259/server.key;

    # --- Bot / scanner mitigation ---
    # NOTE: To enable rate limiting, add this to the http{} block in /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/m;
    # Then uncomment the line below:
    # limit_req zone=general burst=40 nodelay;

    # Drop connections from known scanner user agents
    if ($http_user_agent ~* "(zgrab|masscan|l9scan|leakix|CVE-|CyberConvoy|RecordedFuture|Go-http-client)") {
        return 444;
    }
    if ($http_user_agent = "") {
        return 444;
    }

    # WordPress / WP REST API probing — this site does not run WordPress
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login\.php|wp-config\.php|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
    }

    # Joomla probing
    location ~* ^/(plugins/|administrator/|components/) {
        return 444;
    }

    # IoT / network device CVE probes (Hikvision, D-Link, QNAP, etc.)
    location ~* ^/(SDK/|HNAP1/|cgi-bin/|ssi\.cgi|partymgr/) {
        return 444;
    }

    # Exposed admin / debug endpoints
    location ~* ^/(actuator/|telescope/|solr/|zabbix/|jasperserver|debug/|manager/html) {
        return 444;
    }

    # Drop dotfiles silently
    location ~ /\.(?!well-known).* {
        return 444;
    }
    # --- End bot / scanner mitigation ---

    # Vite-built assets are content-hashed (e.g. /build/assets/app-abc123.js),
    # so it's safe to cache them forever and skip access logging.
    location ^~ /build/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # manifest.json itself isn't hashed and can change on each deploy
    location = /build/manifest.json {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    include forge-conf/3265168/site.conf;
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3265168/after/*;
include forge-conf/3265168/imprint.jerome-arfouche.ca/after/*;